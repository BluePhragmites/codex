# Minimal single-cell gNB prototype configuration.

cell:
  # Downlink center frequency in ARFCN units.
  dl_arfcn: 627334
  # NR band number.
  band: 78
  # Channel bandwidth in MHz.
  channel_bandwidth_MHz: 20
  # Common subcarrier spacing in kHz.
  common_scs_khz: 30
  # Physical cell ID.
  pci: 1
  # MCC+MNC string.
  plmn: "00101"
  # Tracking area code.
  tac: 7
  # SSB / CORESET0 helper indexes for the mock setup.
  ss0_index: 0
  coreset0_index: 6

prach:
  # PRACH common configuration.
  prach_config_index: 159
  prach_root_seq_index: 1
  zero_correlation_zone: 8
  ra_resp_window: 4
  msg3_delta_preamble: 0

rf:
  # Mock RF frontend configuration.
  device_driver: "mock"
  device_args: "loopback=true"
  clock_src: "simulated"
  srate: 30720000.0
  tx_gain: 45.0
  rx_gain: 35.0

core:
  # Future AMF/core bridge configuration.
  enabled: false
  amf_ip: "127.0.0.5"
  amf_port: 38412
  upf_port: 2152
  timeout_ms: 5000
  ran_ue_ngap_id_base: 1
  default_pdu_session_id: 1

broadcast:
  # Broadcast periodicity in slots.
  ssb_period_slots: 2
  # SIB1 is sent at abs_slot = sib1_offset_slot + k * sib1_period_slots.
  sib1_period_slots: 8
  sib1_offset_slot: 4
  # PRACH is only checked on these periodic occasions, and SIB1 advertises the same rule to the UE.
  prach_period_slots: 10
  prach_offset_slot: 2

sim:
  # Total simulated slots and frame geometry.
  total_slots: 20
  slots_per_frame: 10
  # Optional per-slot wall-clock pacing for long-running live demos.
  slot_sleep_ms: 0
  # Relative offsets for Msg3 and Msg4.
  msg3_delay_slots: 4
  msg4_delay_slots: 1
  # Inject the first PRACH burst into the mock radio at this absolute slot.
  # This remains for legacy fallback tests; the live shared-slot UE now learns PRACH occasions from SIB1.
  prach_trigger_abs_slot: 2
  # If Msg3 is not seen, inject a retry PRACH burst after this many slots. Set -1 to disable.
  prach_retry_delay_slots: 4
  preamble_id: 27
  ta_est: 11
  peak_metric: 18.5
  # Whether the mock radio provides a Msg3 burst at the UL grant slot.
  msg3_present: true
  post_msg4_traffic_enabled: true
  post_msg4_dl_pdcch_delay_slots: 1
  post_msg4_dl_time_indicator: 1
  post_msg4_dl_data_to_ul_ack_slots: 1
  # Msg4/RRCSetup advertises the SR periodicity, and both UE and gNB use the same occasion rule.
  post_msg4_sr_period_slots: 10
  post_msg4_sr_offset_slot: 2
  post_msg4_ul_grant_delay_slots: 1
  post_msg4_ul_time_indicator: 2
  post_msg4_dl_harq_process_count: 2
  post_msg4_ul_harq_process_count: 2
  ul_data_present: true
  ul_data_crc_ok: true
  ul_data_snr_db: 16.0
  ul_data_evm: 2.5
  ul_bsr_buffer_size_bytes: 384
  # Optional external UL samples. Leave empty to use generated toy bursts.
  ul_prach_cf32_path: ""
  ul_msg3_cf32_path: ""
  # Optional directory for slot-driven UL input files such as input/slot_20_UL_OBJ_PRACH.cf32.
  # When this directory exists, missing slots are treated as empty UL input instead of synthetic injection.
  ul_input_dir: "input"
  # Optional local UE<->gNB exchange directory for the upcoming JSON event-based workflow.
  local_exchange_dir: "out/local_exchange"
  # Optional shared-memory-backed UE<->gNB slot link for live lock-step interaction.
  shared_slot_path: ""
  shared_slot_timeout_ms: 100
  # Optional TUN-backed UE user-plane endpoint. Keep disabled for the default mock loop.
  ue_tun_enabled: false
  ue_tun_name: "miniue0"
  ue_tun_mtu: 1400
  ue_tun_prefix_len: 16
  ue_tun_isolate_netns: true
  ul_data_hex: "554C5F44415441"
  # Mock Msg3 quality indicators.
  msg3_crc_ok: true
  msg3_snr_db: 18.2
  msg3_evm: 2.1
  # Msg3 content used to build contention resolution and RRC setup.
  contention_id_hex: "A1B2C3D4E5F6"
  establishment_cause: 3
  ue_identity_type: 1
  ue_identity_hex: "1122334455667788"
  include_crnti_ce: true
