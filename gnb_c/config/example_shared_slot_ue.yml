  ul_bsr_buffer_size_bytes: 384
  ul_prach_cf32_path: ""
  ul_msg3_cf32_path: ""
  ul_input_dir: ""
  local_exchange_dir: "out/local_exchange"
  shared_slot_path: "out/shared_slot_link.bin"
