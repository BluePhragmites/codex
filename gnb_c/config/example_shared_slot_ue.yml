  dl_arfcn: 627334
  band: 78
  channel_bandwidth_MHz: 20
  common_scs_khz: 30
  pci: 1
  plmn: "00101"
  tac: 7
  ss0_index: 0
  coreset0_index: 6

prach:
  prach_config_index: 159
  prach_root_seq_index: 1
  zero_correlation_zone: 8
  ra_resp_window: 4
  msg3_delta_preamble: 0

rf:
  device_driver: "mock"
  device_args: "loopback=true"
  clock_src: "simulated"
  srate: 30720000.0
  tx_gain: 45.0
  rx_gain: 35.0

core:
