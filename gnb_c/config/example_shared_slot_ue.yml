  peak_metric: 18.5
  msg3_present: true
  post_msg4_traffic_enabled: true
  post_msg4_sr_period_slots: 4
  post_msg4_sr_offset_slot: 1
  ul_data_present: true
  ul_data_crc_ok: true
  ul_data_snr_db: 16.0
